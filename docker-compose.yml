version: "3.8"

# Requires Supabase to be running locally: supabase start
# Supabase provides the database on port 54322

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
      - SUPABASE_URL_INTERNAL=http://host.docker.internal:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/types:/app/types
      - ./frontend/public:/app/public
    command: npm run dev
    networks:
      - kash-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      # Connect to local Supabase database
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_ANON_KEY=sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
      - SUPABASE_SERVICE_ROLE_KEY=sb_secret_N7UND0UgjKTVK-Uodkm0Hg_xSvEMPvz
      - SUPABASE_DB_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - kash-network

networks:
  kash-network:
    driver: bridge
